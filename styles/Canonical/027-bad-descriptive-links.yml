# 027 - Flag bad descriptive links

# Copilot assisted.

extends: existence
message: "Use descriptive link text instead of '%s' to improve accessibility."
link: https://docs.ubuntu.com/styleguide/en
scope: raw
nonword: true
ignorecase: true
level: suggestion
tokens:
  # Markdown inline links: [... bad text ...](url)
  - '\[[^\]]*\b(?:click here|this (?:link|page|document|article)|read more|learn more|more info(?:rmation)?|here|these|this|more|link)\b[^\]]*\]\([^\)]+\)'
  # RST external links: `... bad text ... <url>`_
  - '`[^`<]*\b(?:click here|this (?:link|page|document|article)|read more|learn more|more info(?:rmation)?|here|these|this|more|link)\b[^`<]*<[^>]+>`_'
  # Sphinx/RST cross-reference roles: :role:`... bad text ...` or :role:`... bad text ... <target>`
  - ':(?:doc|ref|any|download):`[^`]*\b(?:click here|this (?:link|page|document|article)|read more|learn more|more info(?:rmation)?|here|these|this|more|link)\b[^`]*`'
  # MyST cross-reference roles: {role}`... bad text ...` or {role}`... bad text ... <target>`
  - '\{(?:doc|ref|any|download)\}`[^`]*\b(?:click here|this (?:link|page|document|article)|read more|learn more|more info(?:rmation)?|here|these|this|more|link)\b[^`]*`' 